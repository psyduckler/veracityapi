name = "veracityapi"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = true
routes = [
  { pattern = "api.veracityapi.com", custom_domain = true },
  { pattern = "veracityapi.com", custom_domain = true },
  { pattern = "www.veracityapi.com", custom_domain = true }
]

[vars]
MODEL_VERSION = "v0.1"
VIDEO_VISION_MODEL = "claude-haiku-4-5-20251001"
DEMO_RATE_LIMIT_PER_HOUR = "12"

# Daily IndexNow ping at 06:15 UTC. Submits the current sitemap to Bing/Yandex so
# fresh blog and changelog content lands in the indexes ChatGPT Search and other
# AI-citation surfaces read from. The handler is in src/index.ts (scheduled()).
[triggers]
crons = ["15 6 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "veracityapi"
database_id = "62c734dc-ac84-4b04-a1e1-d2a803dfa6e8"
